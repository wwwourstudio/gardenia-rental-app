<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gardenia — Event Rentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--sf:#f8f8f8;--sf2:#f0f0f0;
  --br:#e4e4e4;--br2:#b8b8b8;
  --ink:#111;--mid:#3a3a3a;--muted:#777;--dim:#bbb;
  --green:#2e6e4a;--red:#943030;--blue:#2b5ca8;
  --r:2px;--fd:'Cormorant Garamond',serif;--fb:'Montserrat',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:20px 28px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-brand{font-family:var(--fd);font-size:26px;font-style:italic;color:var(--ink)}
.hdr-brand small{font-family:var(--fb);font-size:9px;font-style:normal;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}
#status{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}

/* FILTER BAR */
.fbar{padding:10px 28px;border-bottom:1px solid var(--br);background:var(--sf);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.flbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-right:4px}
.chip{padding:4px 12px;border:1px solid var(--br2);border-radius:100px;font-size:10px;font-family:var(--fb);font-weight:500;letter-spacing:.05em;color:var(--muted);background:transparent;cursor:pointer;transition:all .12s;text-transform:uppercase}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
.srch-wrap{margin-left:auto;position:relative}
.srch-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--dim)}
.srch{background:var(--bg);border:1px solid var(--br);border-radius:100px;padding:6px 12px 6px 28px;font-family:var(--fb);font-size:11px;color:var(--ink);width:180px;outline:none;transition:border-color .12s}
.srch::placeholder{color:var(--dim)}
.srch:focus{border-color:var(--br2)}

/* SECTION */
.sec{padding:12px 28px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.sec-t{font-family:var(--fd);font-size:20px;color:var(--ink)}
.sec-c{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* MAIN */
.main{padding:20px 28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;display:flex;flex-direction:column}
.card:hover{border-color:var(--br2);box-shadow:0 4px 18px rgba(0,0,0,.07)}
.img-wrap{overflow:hidden;position:relative}
.c-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--sf2);display:block;transition:transform .3s ease}
.card:hover .c-img{transform:scale(1.04)}
.c-ph{width:100%;aspect-ratio:4/3;background:var(--sf2);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:30px}
.c-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase}
.b-yes{background:rgba(255,255,255,.92);color:var(--green);border:1px solid rgba(46,110,74,.25)}
.b-no{background:rgba(255,255,255,.92);color:var(--dim);border:1px solid var(--br)}
.c-body{padding:13px 14px 15px;flex:1;display:flex;flex-direction:column}
.c-cat{font-size:9px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.c-name{font-family:var(--fd);font-size:17px;color:var(--ink);line-height:1.25;margin-bottom:5px}
.card:hover .c-name{text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px}
.c-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.c-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--br);padding-top:10px;margin-top:auto}
.c-price{font-family:var(--fd);font-size:19px;color:var(--ink)}
.c-unit{font-size:10px;color:var(--muted);margin-left:2px}
.c-cta{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);opacity:0;transition:opacity .15s}
.card:hover .c-cta{opacity:1}

/* DETAIL PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.panel{width:460px;max-width:97vw;height:100%;overflow-y:auto;background:var(--bg);border-left:1px solid var(--br);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.overlay.on .panel{transform:translateX(0)}
.p-top{position:sticky;top:0;z-index:10;padding:12px 18px;background:var(--bg);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.p-brand{font-family:var(--fd);font-size:12px;font-style:italic;color:var(--muted)}
.btn-x{background:none;border:1px solid var(--br);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--muted);transition:all .12s}
.btn-x:hover{border-color:var(--ink);color:var(--ink)}
.p-img{width:100%;aspect-ratio:3/2;object-fit:cover;background:var(--sf2);display:block}
.p-img-ph{width:100%;aspect-ratio:3/2;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--dim)}

/* THUMBNAIL STRIP */
.thumbs{display:flex;gap:6px;padding:8px 18px;overflow-x:auto;background:var(--sf);border-bottom:1px solid var(--br)}
.thumb{width:52px;height:40px;object-fit:cover;border-radius:var(--r);border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:border-color .12s}
.thumb.on{border-color:var(--ink)}
.thumb:hover{border-color:var(--br2)}

.p-body{padding:18px 20px 28px}
.p-cat{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.p-name{font-family:var(--fd);font-size:28px;color:var(--ink);line-height:1.15;margin-bottom:8px}
.p-desc{font-size:12px;color:var(--mid);line-height:1.75;margin-bottom:18px}

/* PRICE + AVAILABILITY ROW */
.p-meta{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--br);border:1px solid var(--br);margin-bottom:20px}
.meta-b{background:var(--sf);padding:11px 14px}
.meta-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:3px}
.meta-v{font-family:var(--fd);font-size:20px;color:var(--ink)}
.meta-s{font-size:10px;color:var(--muted);margin-top:1px}

/* CALENDAR */
.cal-section{margin-bottom:18px}
.cal-title{font-family:var(--fd);font-size:18px;font-style:italic;color:var(--ink);margin-bottom:12px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--ink)}
.cal-btn{background:none;border:1px solid var(--br);width:28px;height:28px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .12s}
.cal-btn:hover{border-color:var(--ink);color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;font-weight:600;text-align:center;color:var(--dim);padding:4px 0;text-transform:uppercase;letter-spacing:.06em}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;border-radius:var(--r);cursor:pointer;transition:all .12s;border:1px solid transparent;position:relative}
.cal-day.empty{pointer-events:none}
.cal-day.past{color:var(--dim);pointer-events:none}
.cal-day:not(.past):not(.empty):hover{border-color:var(--br2);background:var(--sf)}
.cal-day.start,.cal-day.end{background:var(--ink)!important;color:#fff!important;border-color:var(--ink)!important}
.cal-day.in-range{background:var(--sf2);color:var(--ink);border-color:transparent}
.cal-day.today{font-weight:600}
.cal-day.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;background:var(--ink);border-radius:50%}
.cal-day.start.today::after,.cal-day.end.today::after{background:#fff}

.date-display{display:flex;gap:8px;margin-top:10px}
.date-pill{flex:1;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:8px 12px}
.date-pill-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:2px}
.date-pill-v{font-size:12px;font-weight:500;color:var(--ink)}
.date-pill-v.empty{color:var(--dim)}

/* PRICE SUMMARY */
.price-box{background:var(--sf);border:1px solid var(--br);padding:13px;margin-bottom:14px;margin-top:16px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.pl.tot{border-top:1px solid var(--br);padding-top:9px;margin-top:7px;margin-bottom:0;font-size:12px;font-weight:500;color:var(--ink)}
.pl.tot .amt{font-family:var(--fd);font-size:20px}

/* FORM */
.form-section{border-top:1px solid var(--br);padding-top:16px;margin-top:4px}
.form-title{font-family:var(--fd);font-size:18px;font-style:italic;color:var(--ink);margin-bottom:14px}
.row{margin-bottom:11px}
.lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px;display:block}
.inp,.ta{width:100%;background:var(--bg);border:1px solid var(--br);border-radius:var(--r);padding:8px 11px;font-family:var(--fb);font-size:12px;color:var(--ink);outline:none;transition:border-color .12s}
.inp:focus,.ta:focus{border-color:var(--mid)}
.inp::placeholder,.ta::placeholder{color:var(--dim)}
.ta{resize:vertical;min-height:62px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
.qty-btn{background:var(--sf2);border:none;color:var(--muted);width:29px;height:29px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qty-btn:hover{background:var(--br2);color:var(--ink)}
.qty-n{padding:0 10px;font-family:var(--fd);font-size:16px;color:var(--ink);min-width:34px;text-align:center;background:var(--bg);height:29px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--br);border-right:1px solid var(--br)}

/* CTA BUTTONS */
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.btn-primary{padding:12px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-family:var(--fb);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .12s;text-align:center;display:block;text-decoration:none;line-height:1.4}
.btn-primary:hover{opacity:.82}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-secondary{padding:12px;background:transparent;color:var(--ink);border:1px solid var(--ink);border-radius:var(--r);font-family:var(--fb);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .12s;text-align:center;display:block;text-decoration:none;line-height:1.4}
.btn-secondary:hover{background:var(--ink);color:#fff}
.btn-full{grid-column:1/-1}
.fn{font-size:10px;color:var(--dim);text-align:center;margin-top:9px;font-style:italic}
.divider{border:none;border-top:1px solid var(--br);margin:14px 0}

/* STATES */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--muted);text-align:center}
.s-ico{font-size:30px}
.s-ttl{font-family:var(--fd);font-size:20px;font-style:italic;color:var(--ink)}
.s-msg{font-size:12px;max-width:260px;line-height:1.6}
.spin{width:24px;height:24px;border:2px solid var(--br);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* SUCCESS */
.suc{display:flex;flex-direction:column;align-items:center;padding:36px 20px;text-align:center;gap:10px}
.suc-ico{font-size:36px}
.suc-ttl{font-family:var(--fd);font-size:26px;font-style:italic;color:var(--ink)}
.suc-msg{font-size:12px;color:var(--muted);max-width:240px;line-height:1.65}
.suc-ref{font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--ink);border:1px solid var(--br);padding:5px 14px}
.btn-ol{padding:9px 20px;background:transparent;border:1px solid var(--ink);border-radius:var(--r);color:var(--ink);font-family:var(--fb);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .12s;margin-top:4px}
.btn-ol:hover{background:var(--ink);color:#fff}

/* TOAST */
.toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:9px 15px;border-radius:var(--r);font-size:11px;font-weight:500;border:1px solid;pointer-events:all;white-space:nowrap;animation:ti .2s ease}
.t-ok{background:var(--bg);color:var(--green);border-color:var(--green)}
.t-err{background:var(--bg);color:var(--red);border-color:var(--red)}
.t-inf{background:var(--ink);color:#fff;border-color:var(--ink)}
@keyframes ti{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:540px){
  .hdr,.fbar,.sec,.main{padding-left:14px;padding-right:14px}
  .panel{width:100vw;border-left:none}
  .grid{grid-template-columns:1fr 1fr;gap:12px}
  .srch{width:100%}.srch-wrap{margin-left:0;width:100%}
  .cta-row{grid-template-columns:1fr}
}
@media(max-width:360px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    Gardenia
    <small>Event Decor · Dallas, TX</small>
  </div>
  <div id="status"></div>
</header>

<!-- SECTION + FILTERS -->
<div class="sec">
  <div class="sec-t">Rental Collection</div>
  <div class="sec-c" id="cnt"></div>
</div>
<div class="fbar">
  <span class="flbl">Category:</span>
  <button class="chip on" onclick="setCat('all',this)">All</button>
  <div id="cats" style="display:contents"></div>
  <div class="srch-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" type="text" id="srch" placeholder="Search rentals…" oninput="doSearch(this.value)">
  </div>
</div>

<!-- MAIN CATALOG -->
<main class="main">
  <div class="state" id="sLoad"><div class="spin"></div><div class="s-ttl">Loading Collection</div><div class="s-msg">Connecting to Gardenia inventory…</div></div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="state" id="sEmpty" style="display:none"><div class="s-ico">🌸</div><div class="s-ttl">No Items Found</div><div class="s-msg">Try adjusting your filters. Add products in Wix Stores to see them here.</div></div>
  <div class="state" id="sErr" style="display:none"><div class="s-ico">⚠</div><div class="s-ttl">Connection Error</div><div class="s-msg" id="errMsg">Could not load items.</div><button class="btn-ol" onclick="load()" style="margin-top:8px">Retry</button></div>
</main>

<!-- DETAIL / BOOKING PANEL -->
<div class="overlay" id="ov" onclick="closeOv(event)">
  <div class="panel" id="panel">
    <div class="p-top">
      <span class="p-brand">Gardenia Event Decor</span>
      <button class="btn-x" onclick="closePanel()">✕</button>
    </div>
    <div id="pBody"></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const BASE = 'https://www.gardeniaeventdecor.com';
const PRODUCTS_URL = BASE + '/_functions/rentalProducts';
const BOOKING_URL  = BASE + '/_functions/rentalBooking';

let all=[], fil=[], activeCat='all', cur=null, qty=1;
let calYear, calMonth, selStart=null, selEnd=null, picking='start';

window.onload = load;

window.addEventListener('message', e=>{
  if(e.data?.type==='RENTAL_FILTER'){
    if(e.data.category) setCat(e.data.category,null);
    if(e.data.search!==undefined) doSearch(e.data.search);
  }
});

function toP(d){try{window.parent.postMessage(d,'*')}catch(e){}}
function setStatus(m,c){const el=document.getElementById('status');el.textContent=m;el.style.color=c||'#bbb'}

// ── LOAD PRODUCTS ──────────────────────────────────────
async function load(){
  show('load'); setStatus('Connecting…');
  try{
    const r = await fetch(PRODUCTS_URL);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    all = d.items||[];
    if(!all.length){
      show('empty');
      setStatus('0 items');
      document.getElementById('sEmpty').querySelector('.s-msg').textContent =
        'No products found. Add your rental items in Wix Stores → Products to get started.';
      return;
    }
    buildCats(); applyFilter(); show('grid');
    setStatus(all.length+' items');
    document.getElementById('cnt').textContent = all.length+' items';
    toP({type:'RENTAL_ITEMS_LOADED', count:all.length});
    setTimeout(()=>toP({type:'RENTAL_HEIGHT',height:document.body.scrollHeight}),100);
  }catch(e){
    document.getElementById('errMsg').textContent = e.message||'Failed to load.';
    show('err'); setStatus('Error','#943030');
  }
}

function show(s){
  document.getElementById('sLoad').style.display  = s==='load' ?'flex':'none';
  document.getElementById('grid').style.display   = s==='grid' ?'grid':'none';
  document.getElementById('sEmpty').style.display = s==='empty'?'flex':'none';
  document.getElementById('sErr').style.display   = s==='err'  ?'flex':'none';
}

// ── FILTERS ────────────────────────────────────────────
function buildCats(){
  const cs=[...new Set(all.map(i=>i.category).filter(Boolean))];
  document.getElementById('cats').innerHTML=cs.map(c=>`<button class="chip" onclick="setCat('${c}',this)">${c}</button>`).join('');
}
function setCat(c,btn){
  activeCat=c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  if(btn)btn.classList.add('on');
  applyFilter();
}
function doSearch(q){applyFilter(q);}
function applyFilter(ov){
  const q=(ov!==undefined?ov:document.getElementById('srch').value).toLowerCase();
  fil=all.filter(i=>
    (activeCat==='all'||i.category===activeCat) &&
    (!q||[i.title,i.description,i.category].some(f=>f?.toLowerCase().includes(q)))
  );
  fil.length?(renderGrid(),show('grid')):show('empty');
  setTimeout(()=>toP({type:'RENTAL_HEIGHT',height:document.body.scrollHeight}),50);
}

// ── RENDER GRID ────────────────────────────────────────
function renderGrid(){
  document.getElementById('grid').innerHTML=fil.map(item=>{
    const av=item.available!==false;
    const img=item.image||'';
    const p=item.price||0;
    return`<div class="card" onclick="openItem('${item.id}')">
      <div class="img-wrap">
        ${img?`<img class="c-img" src="${img}" alt="${esc(item.title)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;c-ph&quot;>🌸</div>'">`:`<div class="c-ph">🌸</div>`}
        <span class="c-badge ${av?'b-yes':'b-no'}">${av?'Available':'Unavailable'}</span>
      </div>
      <div class="c-body">
        ${item.category?`<div class="c-cat">${item.category}</div>`:''}
        <div class="c-name">${item.title||'Untitled'}</div>
        <div class="c-desc">${stripHtml(item.description||'')}</div>
        <div class="c-foot">
          <div><span class="c-price">$${Number(p).toFixed(0)}</span><span class="c-unit">/ day</span></div>
          <span class="c-cta">Reserve →</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return (s||'').replace(/"/g,'&quot;')}
function stripHtml(h){const t=document.createElement('div');t.innerHTML=h;return t.textContent||''}

// ── OPEN ITEM DETAIL ───────────────────────────────────
function openItem(id){
  cur=all.find(i=>i.id===id); if(!cur)return;
  qty=1; selStart=null; selEnd=null; picking='start';
  const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth();
  renderPanel();
  document.getElementById('ov').classList.add('on');
  toP({type:'RENTAL_ITEM_SELECTED',itemId:id,itemTitle:cur.title});
}
function closePanel(){document.getElementById('ov').classList.remove('on');cur=null;}
function closeOv(e){if(e.target===document.getElementById('ov'))closePanel();}

// ── RENDER PANEL ───────────────────────────────────────
function renderPanel(){
  const item=cur, av=item.available!==false, p=Number(item.price||0);
  const imgs=item.images?.length?item.images:(item.image?[item.image]:[]);

  document.getElementById('pBody').innerHTML=`
    ${imgs.length
      ? `<img class="p-img" id="mainImg" src="${imgs[0]}" alt="${esc(item.title)}">`
      : `<div class="p-img-ph">🌸</div>`
    }
    ${imgs.length>1
      ? `<div class="thumbs">${imgs.map((src,i)=>`<img class="thumb ${i===0?'on':''}" src="${src}" onclick="switchImg('${src}',this)">`).join('')}</div>`
      : ''
    }
    <div class="p-body">
      ${item.category?`<div class="p-cat">${item.category}</div>`:''}
      <div class="p-name">${item.title||'Item'}</div>
      <div class="p-desc">${item.description||''}</div>
      <div class="p-meta">
        <div class="meta-b"><div class="meta-l">Daily Rate</div><div class="meta-v">$${p.toFixed(0)}</div><div class="meta-s">per day</div></div>
        <div class="meta-b"><div class="meta-l">Status</div><div class="meta-v" style="font-size:14px;color:${av?'var(--green)':'var(--dim)'}">${av?'Available':'Unavailable'}</div>${item.sku?`<div class="meta-s">SKU: ${item.sku}</div>`:''}</div>
      </div>

      ${av?`
      <!-- CALENDAR -->
      <div class="cal-section">
        <div class="cal-title">Select Your Rental Dates</div>
        <div class="cal-nav">
          <button class="cal-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="calHead"></span>
          <button class="cal-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="date-display">
          <div class="date-pill"><div class="date-pill-l">Pick-Up</div><div class="date-pill-v ${selStart?'':'empty'}" id="dp-start">${selStart?fmtDate(selStart):'Select start'}</div></div>
          <div class="date-pill"><div class="date-pill-l">Return</div><div class="date-pill-v ${selEnd?'':'empty'}" id="dp-end">${selEnd?fmtDate(selEnd):'Select end'}</div></div>
        </div>
      </div>

      <!-- QTY + PRICE SUMMARY -->
      <div class="row" style="margin-top:4px"><label class="lbl">Quantity</label>
        <div class="qty-row">
          <div class="qty-ctrl"><button class="qty-btn" onclick="chQ(-1)">−</button><div class="qty-n" id="qn">1</div><button class="qty-btn" onclick="chQ(1)">+</button></div>
          <span style="font-size:10px;color:var(--dim)">items</span>
        </div>
      </div>
      <div class="price-box" id="priceBox">
        <div class="pl"><span>Daily Rate</span><span>$${p.toFixed(2)} / day</span></div>
        <div class="pl" id="pl-days"><span>Duration</span><span id="pv-days">— select dates</span></div>
        <div class="pl" id="pl-qty"><span>Quantity</span><span id="pv-qty">× 1</span></div>
        <div class="pl tot"><span>Estimated Total</span><span class="amt" id="pv-tot">—</span></div>
      </div>

      <hr class="divider">

      <!-- CONTACT FORM -->
      <div class="form-section">
        <div class="form-title">Your Details</div>
        <div class="row2">
          <div class="row" style="margin-bottom:0"><label class="lbl">First Name</label><input class="inp" type="text" id="fn" placeholder="Jane"></div>
          <div class="row" style="margin-bottom:0"><label class="lbl">Last Name</label><input class="inp" type="text" id="ln" placeholder="Smith"></div>
        </div>
        <div class="row" style="margin-top:11px"><label class="lbl">Email</label><input class="inp" type="email" id="em" placeholder="you@example.com"></div>
        <div class="row"><label class="lbl">Phone</label><input class="inp" type="tel" id="ph" placeholder="+1 (214) 000-0000"></div>
        <div class="row"><label class="lbl">Event Details <span style="text-transform:none;font-weight:400;color:var(--dim)">(optional)</span></label><textarea class="ta" id="nt" placeholder="Wedding, quinceañera, corporate event — venue, theme, date details…"></textarea></div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="cta-row">
        ${item.bookingSlug
          ? `<a class="btn-secondary" href="https://www.gardeniaeventdecor.com/booking-calendar/${item.bookingSlug}" target="_blank" id="bookPayBtn">Book &amp; Pay Online ↗</a>`
          : `<button class="btn-secondary btn-full" style="display:none" id="bookPayBtn"></button>`
        }
        <button class="btn-primary ${!item.bookingSlug?'btn-full':''}" onclick="submitQuote()" id="quoteBtn">Request Quote</button>
      </div>
      <p class="fn">Gardenia will confirm availability &amp; send a quote within 24 hours.</p>
      `:`<div style="text-align:center;padding:24px 0;color:var(--muted);font-size:12px;font-style:italic">This item is currently unavailable. Contact us for alternatives.</div>`}
    </div>`;

  if(av) renderCalendar();
}

function switchImg(src, el){
  document.getElementById('mainImg').src=src;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

// ── CALENDAR ───────────────────────────────────────────
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];

function renderCalendar(){
  const now=new Date(); now.setHours(0,0,0,0);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  document.getElementById('calHead').textContent=MONTHS[calMonth]+' '+calYear;
  let html=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(calYear,calMonth,d);
    const ds=dateStr(date);
    const isPast=date<now;
    const isStart=selStart&&ds===dateStr(selStart);
    const isEnd=selEnd&&ds===dateStr(selEnd);
    const inRange=selStart&&selEnd&&date>selStart&&date<selEnd;
    const isToday=ds===dateStr(now);
    let cls='cal-day';
    if(isPast) cls+=' past';
    if(isStart) cls+=' start';
    if(isEnd) cls+=' end';
    if(inRange) cls+=' in-range';
    if(isToday) cls+=' today';
    html+=`<div class="${cls}" data-date="${ds}" onclick="pickDay('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function changeMonth(d){
  calMonth+=d;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}

function pickDay(ds){
  const date=new Date(ds+'T00:00:00');
  if(picking==='start'||(!selStart)||(selStart&&selEnd)){
    selStart=date; selEnd=null; picking='end';
  } else {
    if(date<=selStart){selStart=date;selEnd=null;picking='end';}
    else{selEnd=date;picking='start';}
  }
  renderCalendar();
  updateDateDisplay();
  updatePrice();
}

function updateDateDisplay(){
  const s=document.getElementById('dp-start');
  const e=document.getElementById('dp-end');
  if(s){s.textContent=selStart?fmtDate(selStart):'Select start';s.className='date-pill-v'+(selStart?'':' empty');}
  if(e){e.textContent=selEnd?fmtDate(selEnd):'Select end';e.className='date-pill-v'+(selEnd?'':' empty');}
}

function updatePrice(){
  const p=Number(cur?.price||0);
  if(!selStart||!selEnd){
    document.getElementById('pv-days').textContent='— select dates';
    document.getElementById('pv-qty').textContent='× '+qty;
    document.getElementById('pv-tot').textContent='—';
    return;
  }
  const days=Math.max(1,Math.round((selEnd-selStart)/86400000));
  const tot=p*days*qty;
  document.getElementById('pv-days').textContent=days+' day'+(days!==1?'s':'');
  document.getElementById('pv-qty').textContent='× '+qty;
  document.getElementById('pv-tot').textContent='$'+tot.toFixed(2);
}

function chQ(d){qty=Math.max(1,qty+d);document.getElementById('qn').textContent=qty;updatePrice();}

function dateStr(d){return d.toISOString().split('T')[0];}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

// ── SUBMIT QUOTE ───────────────────────────────────────
async function submitQuote(){
  if(!selStart||!selEnd){toast('Please select your rental dates on the calendar','err');return;}
  const fn=document.getElementById('fn').value.trim();
  const ln=document.getElementById('ln').value.trim();
  const em=document.getElementById('em').value.trim();
  const ph=document.getElementById('ph').value.trim();
  const nt=document.getElementById('nt').value.trim();
  if(!fn||!ln){toast('Please enter your name','err');return;}
  if(!em||!/\S+@\S+\.\S+/.test(em)){toast('Please enter a valid email','err');return;}

  const btn=document.getElementById('quoteBtn');
  btn.disabled=true; btn.textContent='Sending…';

  const item=cur, p=Number(item.price||0);
  const days=Math.max(1,Math.round((selEnd-selStart)/86400000));
  const tot=p*days*qty;

  try{
    const r=await fetch(BOOKING_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        firstName:fn, lastName:ln, email:em, phone:ph,
        itemId:item.id, itemTitle:item.title||'',
        itemPrice:p, startDate:dateStr(selStart), endDate:dateStr(selEnd),
        quantity:qty, total:tot, notes:nt
      })
    });
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'HTTP '+r.status);
    showSuccess(d.ref||d.bookingId, em, selStart, selEnd, tot);
    toP({type:'RENTAL_BOOKING_CREATED',ref:d.ref,itemTitle:item.title,email:em,total:tot});
  }catch(e){
    toast('Could not submit: '+(e.message||'Unknown error'),'err');
    btn.disabled=false; btn.textContent='Request Quote';
  }
}

function showSuccess(ref,em,start,end,tot){
  document.getElementById('pBody').innerHTML=`
    <div class="suc">
      <div class="suc-ico">🌸</div>
      <div class="suc-ttl">Quote Request Sent</div>
      <div class="suc-msg">Thank you! Gardenia will review your request and get back to you at <strong>${em}</strong> within 24 hours.</div>
      <div class="suc-ref">${ref}</div>
      <div style="font-size:11px;color:var(--muted)">${fmtDate(start)} → ${fmtDate(end)} · Est. $${Number(tot).toFixed(2)}</div>
      <button class="btn-ol" onclick="closePanel();load()">Continue Browsing</button>
    </div>`;
  toast('Quote request sent — '+ref,'ok');
}

function toast(msg,type='inf',dur=4200){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast t-'+(type==='ok'?'ok':type==='err'?'err':'inf');
  t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .25s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},dur);
}
</script>
</body>
</html>
