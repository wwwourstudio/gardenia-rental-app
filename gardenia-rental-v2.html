<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gardenia Event Decor — Rentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--surface:#f9f9f9;--surface2:#f2f2f2;
  --border:#e6e6e6;--border-dk:#c0c0c0;
  --ink:#111;--ink-mid:#3a3a3a;--ink-muted:#777;--ink-dim:#bbb;
  --green:#2e6e4a;--red:#943030;--radius:2px;
  --fd:'Cormorant Garamond',serif;--fb:'Montserrat',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:22px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hdr-logo{font-family:var(--fd);font-size:28px;font-weight:400;letter-spacing:0.04em;color:var(--ink);font-style:italic}
.hdr-logo span{font-size:11px;font-family:var(--fb);font-weight:400;font-style:normal;color:var(--ink-muted);letter-spacing:0.1em;text-transform:uppercase;display:block;margin-top:2px}
#status{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim)}

/* SECTION TITLE */
.sec{padding:14px 32px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sec-title{font-family:var(--fd);font-size:21px;font-weight:400;color:var(--ink)}
.sec-count{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted)}

/* FILTER BAR */
.fbar{padding:10px 32px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.flbl{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-right:4px}
.chip{padding:4px 13px;border:1px solid var(--border-dk);border-radius:100px;font-size:10px;font-family:var(--fb);font-weight:500;letter-spacing:.06em;color:var(--ink-muted);background:transparent;cursor:pointer;transition:all .12s;text-transform:uppercase}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
.srch-wrap{margin-left:auto;position:relative}
.srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-dim)}
.srch{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 12px 6px 30px;font-family:var(--fb);font-size:11px;color:var(--ink);width:190px;outline:none;transition:border-color .12s}
.srch::placeholder{color:var(--ink-dim)}
.srch:focus{border-color:var(--border-dk)}

/* MAIN */
.main{padding:22px 32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .18s,box-shadow .18s;position:relative;display:flex;flex-direction:column}
.card:hover{border-color:var(--border-dk);box-shadow:0 4px 20px rgba(0,0,0,.07)}
.card-img-wrap{overflow:hidden;position:relative}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--surface2);display:block;transition:transform .3s ease}
.card:hover .card-img{transform:scale(1.04)}
.card-ph{width:100%;aspect-ratio:4/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink-dim);font-size:32px}
.badge{position:absolute;top:8px;right:8px;padding:3px 9px;border-radius:100px;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.b-yes{background:rgba(255,255,255,.9);color:var(--green);border:1px solid rgba(46,110,74,.25)}
.b-no{background:rgba(255,255,255,.9);color:var(--ink-dim);border:1px solid var(--border)}
.card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.card-cat{font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:4px}
.card-name{font-family:var(--fd);font-size:18px;font-weight:400;color:var(--ink);line-height:1.25;margin-bottom:5px}
.card:hover .card-name{text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.card-desc{font-size:11px;color:var(--ink-muted);line-height:1.55;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px;margin-top:auto}
.card-price{font-family:var(--fd);font-size:20px;font-weight:400;color:var(--ink)}
.card-unit{font-size:10px;color:var(--ink-muted);font-family:var(--fb);margin-left:2px}
.card-arrow{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);opacity:0;transition:opacity .18s}
.card:hover .card-arrow{opacity:1}

/* DETAIL PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.panel{width:420px;max-width:96vw;height:100%;overflow-y:auto;background:var(--bg);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.overlay.on .panel{transform:translateX(0)}
.panel-top{position:sticky;top:0;z-index:10;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-brand{font-family:var(--fd);font-size:13px;font-style:italic;color:var(--ink-muted)}
.btn-x{background:none;border:1px solid var(--border);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--ink-muted);transition:all .12s}
.btn-x:hover{border-color:var(--ink);color:var(--ink)}
.p-img{width:100%;aspect-ratio:3/2;object-fit:cover;background:var(--surface2);display:block}
.p-img-ph{width:100%;aspect-ratio:3/2;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--ink-dim)}
.p-body{padding:20px 22px 28px}
.p-cat{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px}
.p-name{font-family:var(--fd);font-size:30px;font-weight:400;color:var(--ink);line-height:1.15;margin-bottom:10px}
.p-desc{font-size:12px;color:var(--ink-mid);line-height:1.75;margin-bottom:20px}
.p-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:22px}
.stat{background:var(--surface);padding:11px 12px;text-align:center}
.stat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-dim);margin-bottom:3px}
.stat-val{font-family:var(--fd);font-size:19px;font-weight:400;color:var(--ink)}
.stat-sub{font-size:10px;color:var(--ink-muted);margin-top:1px}

/* BOOKING FORM */
.bk-sec{border-top:1px solid var(--border);padding-top:18px}
.bk-title{font-family:var(--fd);font-size:20px;font-style:italic;color:var(--ink);margin-bottom:15px}
.row{margin-bottom:12px}
.lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:5px;display:block}
.inp,.ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 11px;font-family:var(--fb);font-size:12px;color:var(--ink);outline:none;transition:border-color .12s}
.inp:focus,.ta:focus{border-color:var(--ink-mid)}
.inp::placeholder,.ta::placeholder{color:var(--ink-dim)}
.ta{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.qty-btn{background:var(--surface2);border:none;color:var(--ink-muted);width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qty-btn:hover{background:var(--border-dk);color:var(--ink)}
.qty-n{padding:0 12px;font-family:var(--fd);font-size:16px;color:var(--ink);min-width:36px;text-align:center;background:var(--bg);height:30px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.qty-max{font-size:10px;color:var(--ink-dim)}
.price-box{background:var(--surface);border:1px solid var(--border);padding:13px;margin-bottom:13px;margin-top:14px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-muted);margin-bottom:5px}
.pl.tot{border-top:1px solid var(--border);padding-top:9px;margin-top:7px;margin-bottom:0;font-size:12px;font-weight:500;color:var(--ink)}
.pl.tot .amt{font-family:var(--fd);font-size:20px}
.btn-bk{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:var(--radius);font-family:var(--fb);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:opacity .12s}
.btn-bk:hover{opacity:.82}
.btn-bk:disabled{opacity:.35;cursor:not-allowed}
.fn{font-size:10px;color:var(--ink-dim);text-align:center;margin-top:9px;font-style:italic}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.btn-ol{padding:9px 20px;background:transparent;border:1px solid var(--ink);border-radius:var(--radius);color:var(--ink);font-family:var(--fb);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .12s;margin-top:6px}
.btn-ol:hover{background:var(--ink);color:#fff}

/* STATES */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:10px;color:var(--ink-muted);text-align:center}
.state-ico{font-size:32px}
.state-ttl{font-family:var(--fd);font-size:21px;font-style:italic;color:var(--ink)}
.state-msg{font-size:12px;max-width:280px;line-height:1.6}
.spin{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* SUCCESS */
.suc{display:flex;flex-direction:column;align-items:center;padding:36px 24px;text-align:center;gap:10px}
.suc-ico{font-size:38px}
.suc-ttl{font-family:var(--fd);font-size:28px;font-style:italic;color:var(--ink)}
.suc-msg{font-size:12px;color:var(--ink-muted);max-width:250px;line-height:1.65}
.suc-ref{font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--ink);border:1px solid var(--border);padding:5px 16px}
.suc-dt{font-size:11px;color:var(--ink-muted)}

/* TOAST */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{padding:9px 16px;border-radius:var(--radius);font-size:11px;font-weight:500;border:1px solid;pointer-events:all;white-space:nowrap;animation:ti .2s ease}
.t-ok{background:var(--bg);color:var(--green);border-color:var(--green)}
.t-err{background:var(--bg);color:var(--red);border-color:var(--red)}
.t-inf{background:var(--ink);color:#fff;border-color:var(--ink)}
@keyframes ti{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:540px){
  .hdr,.sec,.fbar,.main{padding-left:16px;padding-right:16px}
  .panel{width:100vw;border-left:none}
  .grid{grid-template-columns:1fr 1fr;gap:12px}
  .srch{width:100%}.srch-wrap{margin-left:0;width:100%}
}
@media(max-width:380px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-logo">
    Gardenia
    <span>Event Decor · Dallas, TX</span>
  </div>
  <div id="status"></div>
</header>

<!-- SECTION -->
<div class="sec">
  <div class="sec-title">Browse Our Rental Collection</div>
  <div class="sec-count" id="cnt"></div>
</div>

<!-- FILTERS -->
<div class="fbar">
  <span class="flbl">Category:</span>
  <button class="chip on" onclick="setCat('all',this)">All</button>
  <div id="cats" style="display:contents"></div>
  <div class="srch-wrap">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="srch" type="text" id="srch" placeholder="Search rentals…" oninput="search(this.value)">
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div class="state" id="sLoad"><div class="spin"></div><div class="state-ttl">Loading Collection</div><div class="state-msg">Connecting to your Gardenia inventory…</div></div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="state" id="sEmpty" style="display:none"><div class="state-ico">🌸</div><div class="state-ttl">No Items Found</div><div class="state-msg">Adjust your search or filters. Add items via your Wix CMS.</div></div>
  <div class="state" id="sErr" style="display:none"><div class="state-ico">⚠</div><div class="state-ttl">Connection Error</div><div class="state-msg" id="errMsg">Could not load items.</div><button class="btn-ol" onclick="load()" style="margin-top:8px">Retry</button></div>
</main>

<!-- DETAIL PANEL -->
<div class="overlay" id="ov" onclick="closeOv(event)">
  <div class="panel">
    <div class="panel-top">
      <span class="panel-brand">Gardenia Event Decor</span>
      <button class="btn-x" onclick="closePanel()">✕</button>
    </div>
    <div id="pBody"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toasts" id="toasts"></div>

<script>
// ── The base URL of your Wix site — Velo functions live here ──
const BASE = 'https://www.gardeniaeventdecor.com';
const ITEMS_URL   = BASE + '/_functions/rentalItems';
const BOOKING_URL = BASE + '/_functions/rentalBooking';

let all=[], fil=[], cat='all', cur=null, qty=1;

window.onload = load;

// Also accept postMessage config override (from Wix Velo page code)
window.addEventListener('message', e=>{
  if(e.data?.type==='RENTAL_FILTER'){
    if(e.data.category) setCat(e.data.category,null);
    if(e.data.search!==undefined) search(e.data.search);
  }
});

function toP(d){try{window.parent.postMessage(d,'*')}catch(e){}}
function st(m,c){const el=document.getElementById('status');el.textContent=m;el.style.color=c||'#bbb'}

async function load(){
  show('load'); st('Connecting…');
  try{
    const r = await fetch(ITEMS_URL);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    all = d.items || [];
    if(!all.length){show('empty');st('0 items');return;}
    buildCats(); filter(); show('grid');
    st(all.length+' items');
    document.getElementById('cnt').textContent = all.length+' items available';
    toP({type:'RENTAL_ITEMS_LOADED',count:all.length});
    setTimeout(()=>toP({type:'RENTAL_HEIGHT',height:document.body.scrollHeight}),100);
  }catch(e){
    document.getElementById('errMsg').textContent=e.message||'Failed to load.';
    show('err'); st('Error','#943030');
  }
}

function show(s){
  document.getElementById('sLoad').style.display  = s==='load' ?'flex':'none';
  document.getElementById('grid').style.display   = s==='grid' ?'grid':'none';
  document.getElementById('sEmpty').style.display = s==='empty'?'flex':'none';
  document.getElementById('sErr').style.display   = s==='err'  ?'flex':'none';
}

function buildCats(){
  const cs=[...new Set(all.map(i=>i.category).filter(Boolean))];
  document.getElementById('cats').innerHTML=cs.map(c=>`<button class="chip" onclick="setCat('${c}',this)">${c}</button>`).join('');
}
function setCat(c,btn){
  cat=c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  if(btn)btn.classList.add('on');
  filter();
}
function search(q){filter(q);}
function filter(ov){
  const q=(ov!==undefined?ov:document.getElementById('srch').value).toLowerCase();
  fil=all.filter(i=>(cat==='all'||i.category===cat)&&(!q||[i.title,i.description,i.category].some(f=>f?.toLowerCase().includes(q))));
  fil.length?(renderGrid(),show('grid')):show('empty');
  setTimeout(()=>toP({type:'RENTAL_HEIGHT',height:document.body.scrollHeight}),50);
}

function renderGrid(){
  document.getElementById('grid').innerHTML=fil.map(item=>{
    const av=item.available!==false;
    const img=item.image||'';
    const p=item.pricePerDay||item.price||0;
    return`<div class="card" onclick="open('${item._id}')">
      <div class="card-img-wrap">
        ${img?`<img class="card-img" src="${img}" alt="${item.title||''}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;card-ph&quot;>🌸</div>'">`:`<div class="card-ph">🌸</div>`}
        <span class="badge ${av?'b-yes':'b-no'}">${av?'Available':'Unavailable'}</span>
      </div>
      <div class="card-body">
        ${item.category?`<div class="card-cat">${item.category}</div>`:''}
        <div class="card-name">${item.title||'Untitled'}</div>
        <div class="card-desc">${item.description||''}</div>
        <div class="card-foot">
          <div><span class="card-price">$${Number(p).toFixed(0)}</span><span class="card-unit">/ day</span></div>
          <span class="card-arrow">View →</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function open(id){
  cur=all.find(i=>i._id===id); if(!cur)return;
  qty=1; renderPanel();
  document.getElementById('ov').classList.add('on');
  toP({type:'RENTAL_ITEM_SELECTED',itemId:id,itemTitle:cur.title});
}
function closePanel(){document.getElementById('ov').classList.remove('on');cur=null;}
function closeOv(e){if(e.target===document.getElementById('ov'))closePanel();}

function renderPanel(){
  const item=cur,av=item.available!==false,p=Number(item.pricePerDay||item.price||0);
  const img=item.image||'';
  const td=new Date().toISOString().split('T')[0];
  const tm=new Date(Date.now()+86400000).toISOString().split('T')[0];
  document.getElementById('pBody').innerHTML=`
    ${img?`<img class="p-img" src="${img}" alt="${item.title||''}">`:`<div class="p-img-ph">🌸</div>`}
    <div class="p-body">
      ${item.category?`<div class="p-cat">${item.category}</div>`:''}
      <div class="p-name">${item.title||'Item'}</div>
      <div class="p-desc">${item.description||''}</div>
      <div class="p-stats">
        <div class="stat"><div class="stat-lbl">Rate</div><div class="stat-val">$${p.toFixed(0)}</div><div class="stat-sub">per day</div></div>
        <div class="stat"><div class="stat-lbl">Status</div><div class="stat-val" style="font-size:13px;color:${av?'var(--green)':'var(--ink-dim)'}">${av?'Available':'Unavailable'}</div>${item.quantity!=null?`<div class="stat-sub">${item.quantity} in stock</div>`:''}</div>
        <div class="stat"><div class="stat-lbl">Location</div><div class="stat-val" style="font-size:12px">Dallas</div><div class="stat-sub">TX</div></div>
      </div>
      ${av?`
      <div class="bk-sec">
        <div class="bk-title">Reserve This Item</div>
        <div class="row2">
          <div class="row" style="margin-bottom:0"><label class="lbl">Event Start</label><input class="inp" type="date" id="d1" value="${td}" min="${td}" onchange="calcP()"></div>
          <div class="row" style="margin-bottom:0"><label class="lbl">Event End</label><input class="inp" type="date" id="d2" value="${tm}" min="${td}" onchange="calcP()"></div>
        </div>
        <div class="row" style="margin-top:12px"><label class="lbl">Quantity</label>
          <div class="qty-row">
            <div class="qty-ctrl"><button class="qty-btn" onclick="chQ(-1)">−</button><div class="qty-n" id="qn">1</div><button class="qty-btn" onclick="chQ(1)">+</button></div>
            ${item.quantity!=null?`<span class="qty-max">${item.quantity} max</span>`:''}
          </div>
        </div>
        <hr class="divider">
        <div class="row2">
          <div class="row" style="margin-bottom:0"><label class="lbl">First Name</label><input class="inp" type="text" id="fn" placeholder="Jane"></div>
          <div class="row" style="margin-bottom:0"><label class="lbl">Last Name</label><input class="inp" type="text" id="ln" placeholder="Smith"></div>
        </div>
        <div class="row" style="margin-top:12px"><label class="lbl">Email</label><input class="inp" type="email" id="em" placeholder="you@example.com"></div>
        <div class="row"><label class="lbl">Phone</label><input class="inp" type="tel" id="ph" placeholder="+1 (214) 000-0000"></div>
        <div class="row"><label class="lbl">Event Notes <span style="text-transform:none;font-weight:400;color:var(--ink-dim)">(optional)</span></label><textarea class="ta" id="nt" placeholder="Wedding, quinceañera, corporate — venue, theme, requirements…"></textarea></div>
        <div class="price-box">
          <div class="pl"><span>Daily Rate</span><span>$${p.toFixed(2)}</span></div>
          <div class="pl" id="pdays"><span>Duration</span><span>1 day</span></div>
          <div class="pl" id="pqty"><span>Quantity</span><span>× 1</span></div>
          <div class="pl tot"><span>Estimated Total</span><span class="amt" id="ptot">$${p.toFixed(2)}</span></div>
        </div>
        <button class="btn-bk" id="bkBtn" onclick="submit()">Request Reservation</button>
        <p class="fn">Gardenia will confirm availability within 24 hours.</p>
      </div>`:`<div style="text-align:center;padding:20px 0;color:var(--ink-muted);font-size:12px;font-style:italic">This item is currently unavailable. Contact us for alternatives.</div>`}
    </div>`;
}

function chQ(d){qty=Math.max(1,Math.min(cur?.quantity||99,qty+d));document.getElementById('qn').textContent=qty;calcP();}
function calcP(){
  const s=new Date(document.getElementById('d1').value),e=new Date(document.getElementById('d2').value);
  const p=Number(cur?.pricePerDay||cur?.price||0);
  let days=Math.max(1,Math.round((e-s)/86400000));if(isNaN(days))days=1;
  const tot=p*days*qty;
  document.getElementById('pdays').innerHTML=`<span>Duration</span><span>${days} day${days!==1?'s':''}</span>`;
  document.getElementById('pqty').innerHTML=`<span>Quantity</span><span>× ${qty}</span>`;
  document.getElementById('ptot').textContent=`$${tot.toFixed(2)}`;
}

async function submit(){
  const fn=document.getElementById('fn').value.trim();
  const ln=document.getElementById('ln').value.trim();
  const em=document.getElementById('em').value.trim();
  const ph=document.getElementById('ph').value.trim();
  const nt=document.getElementById('nt').value.trim();
  const d1=document.getElementById('d1').value;
  const d2=document.getElementById('d2').value;
  if(!fn||!ln){toast('Please enter your name','err');return;}
  if(!em||!/\S+@\S+\.\S+/.test(em)){toast('Please enter a valid email','err');return;}
  if(!d1||!d2||new Date(d2)<=new Date(d1)){toast('Please check your dates','err');return;}
  const btn=document.getElementById('bkBtn');btn.disabled=true;btn.textContent='Sending…';
  const item=cur,p=Number(item.pricePerDay||item.price||0);
  const days=Math.max(1,Math.round((new Date(d2)-new Date(d1))/86400000));
  const tot=p*days*qty;
  try{
    const r=await fetch(BOOKING_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({firstName:fn,lastName:ln,email:em,phone:ph,itemId:item._id,itemTitle:item.title||'',startDate:d1,endDate:d2,quantity:qty,total:tot,notes:nt})
    });
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'HTTP '+r.status);
    showSuccess(d.ref||d.bookingId,em,d1,d2,tot);
    toP({type:'RENTAL_BOOKING_CREATED',bookingId:d.bookingId,ref:d.ref,itemTitle:item.title,email:em,total:tot,startDate:d1,endDate:d2});
  }catch(e){
    toast('Could not submit: '+(e.message||'Unknown error'),'err');
    btn.disabled=false;btn.textContent='Request Reservation';
  }
}

function showSuccess(ref,em,d1,d2,tot){
  document.getElementById('pBody').innerHTML=`
    <div class="suc">
      <div class="suc-ico">🌸</div>
      <div class="suc-ttl">Request Received</div>
      <div class="suc-msg">Thank you! Gardenia will review your reservation and confirm availability within 24 hours at <strong>${em}</strong>.</div>
      <div class="suc-ref">${ref}</div>
      <div class="suc-dt">${d1} → ${d2} · Est. $${Number(tot).toFixed(2)}</div>
      <button class="btn-ol" onclick="closePanel();load()">Continue Browsing</button>
    </div>`;
  toast('Request submitted — '+ref,'ok');
}

function toast(msg,type='inf',dur=4000){
  const c=document.getElementById('toasts'),t=document.createElement('div');
  t.className='toast t-'+(type==='ok'?'ok':type==='err'?'err':'inf');
  t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .25s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},dur);
}
</script>
</body>
</html>
